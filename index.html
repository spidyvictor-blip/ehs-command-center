<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EHS Command Center · GE Aerospace Muskegon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EEF2FF;
  --bg2:#E0E7FF;
  --surface:#FFFFFF;
  --surface2:#F8FAFF;
  --border:#CBD5F0;
  --border2:#A5B4FC;
  --navy:#0F2D6B;
  --navy2:#1E3A8A;
  --blue:#1D4ED8;
  --blue2:#3B82F6;
  --blue-lt:#EFF6FF;
  --green:#059669;
  --green-lt:#D1FAE5;
  --amber:#D97706;
  --amber-lt:#FEF3C7;
  --red:#DC2626;
  --red-lt:#FEE2E2;
  --purple:#7C3AED;
  --purple-lt:#EDE9FE;
  --teal:#0891B2;
  --teal-lt:#CFFAFE;
  --gold:#B45309;
  --text:#0F172A;
  --text2:#1E293B;
  --text3:#374151;
  --muted:#6B7280;
  --r:10px;
  --shadow:0 1px 8px rgba(15,45,107,.10);
  --shadow-md:0 4px 20px rgba(15,45,107,.15);
  --shadow-lg:0 8px 40px rgba(15,45,107,.2);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#E0E7FF}
::-webkit-scrollbar-thumb{background:#A5B4FC;border-radius:3px}

/* ─── TOPBAR ─────────────────────────────────────────────────── */
#topbar{position:sticky;top:0;z-index:500;background:var(--navy);box-shadow:0 2px 16px rgba(0,0,0,.3)}
.tb-inner{max-width:1600px;margin:0 auto;padding:0 20px;display:flex;align-items:stretch;justify-content:space-between;flex-wrap:wrap}
.brand{padding:11px 0 8px;display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:15px;font-weight:900;color:#fff;display:flex;align-items:center;gap:9px;letter-spacing:-.2px}
.live{width:8px;height:8px;border-radius:50%;background:#34D399;box-shadow:0 0 8px #34D399;animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.brand-sub{font-size:10px;color:#93C5FD;font-weight:500;letter-spacing:.3px}
.vpp-tag{background:linear-gradient(135deg,#92400E,#D97706);color:#FEF3C7;border-radius:20px;padding:3px 11px;font-size:9px;font-weight:800;letter-spacing:.4px}
.nav-wrap{display:flex;align-items:flex-end;gap:0;overflow-x:auto}
.nav-btn{padding:13px 16px;background:transparent;border:none;color:#93C5FD;font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif;letter-spacing:.2px}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.07)}
.nav-btn.active{color:#fff;border-bottom-color:#60A5FA;background:rgba(255,255,255,.05)}

/* ─── LAYOUT ─────────────────────────────────────────────────── */
main{max-width:1600px;margin:0 auto;padding:18px 18px 60px}
.page{display:flex;flex-direction:column;gap:14px}
.page-hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .22s ease both}

/* ─── CARD ───────────────────────────────────────────────────── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:12px 18px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-hdr-gold{background:linear-gradient(135deg,#78350F,#B45309)}
.ch-title{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:7px}
.ch-sub{font-size:10px;color:#93C5FD;font-weight:500}
.ch-sub-gold{color:#FCD34D}

/* ─── KPI GRID ───────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:12px}
.kpi{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:16px 16px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:default}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-top{position:absolute;top:0;left:0;right:0;height:4px}
.kpi-val{font-size:30px;font-weight:900;line-height:1;letter-spacing:-1px;margin-top:2px}
.kpi-lbl{font-size:9px;font-weight:800;color:var(--muted);margin-top:7px;text-transform:uppercase;letter-spacing:.6px}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}

/* ─── PROGRESS ───────────────────────────────────────────────── */
.pt{background:#E0E7FF;border-radius:8px;overflow:hidden}
.pf{border-radius:8px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ─── TABLE ──────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg)}
th{padding:9px 12px;color:var(--navy);font-size:9px;font-weight:800;text-align:left;border-bottom:2px solid var(--border2);letter-spacing:.7px;text-transform:uppercase;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #EEF2FF;vertical-align:middle;color:var(--text2)}
tbody tr{transition:background .1s}
tbody tr:hover{background:#F0F4FF}

/* ─── EDITABLE CELLS ─────────────────────────────────────────── */
.cell-edit{background:transparent;border:1.5px solid transparent;border-radius:6px;padding:3px 6px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer;transition:all .15s;outline:none;font-weight:500;min-width:90px}
.cell-edit:hover{border-color:var(--border2);background:#F0F4FF}
.cell-edit:focus{border-color:var(--blue);background:#EFF6FF;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
select.cell-edit option{background:#fff;color:var(--text)}
input.cell-edit{width:100%}

/* ─── STATUS & PRI BADGES ────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;white-space:nowrap;border:1.5px solid transparent}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-Complete{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}.b-Complete::before{background:#059669}
.b-OnSchedule{background:#CFFAFE;color:#164E63;border-color:#67E8F9}.b-OnSchedule::before{background:#0891B2}
.b-Behind{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5}.b-Behind::before{background:#DC2626}
.b-AtRisk{background:#FEF3C7;color:#92400E;border-color:#FCD34D}.b-AtRisk::before{background:#D97706}
.b-NotStarted{background:#EDE9FE;color:#4C1D95;border-color:#C4B5FD}.b-NotStarted::before{background:#7C3AED}
.b-Open{background:#F1F5F9;color:#374151;border-color:#CBD5E1}.b-Open::before{background:#6B7280}
.b-Ongoing{background:#ECFDF5;color:#065F46;border-color:#6EE7B7}.b-Ongoing::before{background:#059669}
.b-OnHold{background:#FEF3C7;color:#92400E;border-color:#FCD34D}.b-OnHold::before{background:#D97706}
.p-High{background:#FEE2E2;color:#991B1B;border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800;border:1.5px solid #FCA5A5}
.p-Medium{background:#FEF3C7;color:#92400E;border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800;border:1.5px solid #FCD34D}
.p-Low{background:#D1FAE5;color:#065F46;border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800;border:1.5px solid #6EE7B7}

/* ─── CHECK BUTTON ───────────────────────────────────────────── */
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px;flex-shrink:0}
.chk:hover{border-color:var(--green);background:var(--green-lt)}
.chk.on{background:var(--green);border-color:var(--green);color:#fff}

/* ─── FILTER BAR ─────────────────────────────────────────────── */
.fbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;padding:14px 16px;background:var(--surface2);border-bottom:1.5px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:9px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.8px}
select.fsel,input.fsearch{background:#fff;color:var(--text);border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:11px;font-family:'Inter',sans-serif;outline:none;cursor:pointer;transition:border-color .15s;font-weight:500}
select.fsel{min-width:125px}
input.fsearch{min-width:180px}
select.fsel:focus,input.fsearch:focus{border-color:var(--blue)}
.fcount{font-size:11px;color:var(--muted);align-self:flex-end;padding-bottom:6px;font-weight:600}
.fcount strong{color:var(--blue)}
.btn{border:none;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-clear{background:#E0E7FF;color:var(--navy);align-self:flex-end}
.btn-clear:hover{background:var(--border2);color:#fff}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--navy)}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:6px}

/* ─── STATUS TILES ───────────────────────────────────────────── */
.s-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;padding:14px 16px}
.s-tile{border-radius:9px;padding:12px;text-align:center;cursor:pointer;border:2px solid;transition:transform .15s,box-shadow .15s}
.s-tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.s-tile-val{font-size:24px;font-weight:900;line-height:1}
.s-tile-lbl{font-size:9px;font-weight:800;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.s-tile-pct{font-size:9px;color:var(--muted);margin-top:2px}

/* ─── MILESTONES ─────────────────────────────────────────────── */
.ms-row{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid #EEF2FF;transition:background .1s;flex-wrap:wrap}
.ms-row:hover{background:#F0F4FF}
.ms-row:last-child{border-bottom:none}
.ms-num{width:30px;height:30px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.ms-goal .ms-num{background:linear-gradient(135deg,#92400E,#D97706)}
.ms-text{flex:1;min-width:160px}
.ms-title{font-size:12px;font-weight:600;color:var(--navy)}
.ms-goal .ms-title{font-weight:900;font-size:13px;color:var(--gold)}
.ms-meta{font-size:10px;color:var(--muted);margin-top:1px}
.ms-prog{min-width:160px;display:flex;flex-direction:column;gap:4px}

/* ─── PERSON PAGE ────────────────────────────────────────────── */
.person-banner{padding:20px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.p-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.p-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.3px}
.p-role{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px;font-weight:500}
.p-mini-kpis{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
.p-kpi{background:rgba(255,255,255,.12);border-radius:9px;padding:10px 14px;text-align:center;min-width:70px;border:1px solid rgba(255,255,255,.2)}
.p-kpi-val{font-size:20px;font-weight:900;color:#fff;line-height:1}
.p-kpi-lbl{font-size:8px;font-weight:700;color:rgba(255,255,255,.7);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:1000px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ─── SCHEDULE CALENDAR ──────────────────────────────────────── */
.sched-grid{display:grid;grid-template-columns:60px repeat(5,1fr);border-top:1px solid var(--border)}
.sched-day-hdr{padding:8px;text-align:center;background:var(--bg);border-bottom:2px solid var(--border2);font-size:10px;font-weight:800;color:var(--navy);letter-spacing:.5px;border-right:1px solid var(--border)}
.sched-time{padding:4px 8px;text-align:right;font-size:9px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;background:var(--surface2);white-space:nowrap;vertical-align:top;height:32px;line-height:22px}
.sched-cell{border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;height:32px;padding:2px;position:relative;vertical-align:top}
.sched-event{border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:26px;display:flex;align-items:center;cursor:default;border-left:3px solid}
.sched-event:hover{z-index:10;white-space:normal;overflow:visible;box-shadow:var(--shadow-md)}

/* ─── RECURRING LIST ─────────────────────────────────────────── */
.rec-section{padding:8px 0}
.rec-hdr{padding:6px 16px;font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.8px}
.rec-item{display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid #EEF2FF;transition:background .1s}
.rec-item:hover{background:#F0F4FF}
.rec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rec-text{font-size:11px;color:var(--text2);font-weight:500;flex:1}

/* ─── TOAST ──────────────────────────────────────────────────── */
#toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:9px;font-size:12px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:9999;display:flex;align-items:center;gap:8px}
#toast.show{opacity:1;transform:translateY(0)}

/* ─── MISC ───────────────────────────────────────────────────── */
.info-bar{padding:8px 18px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px}
a.link{color:var(--blue);font-weight:700;text-decoration:none}
a.link:hover{text-decoration:underline}
footer{background:var(--navy);color:#93C5FD;text-align:center;padding:16px;font-size:10px;font-weight:500;letter-spacing:.3px;margin-top:24px}

@media(max-width:640px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .nav-wrap{overflow-x:auto}
  main{padding:12px 10px 40px}
}
</style>
</head>
<body>

<div id="topbar">

    <div class="brand">

// ═════════════════════════════════════════════════════════════════
// STATE — localStorage persistence
// ═════════════════════════════════════════════════════════════════
function loadState(){
  try{return JSON.parse(localStorage.getItem('ehs_v3')||'{}')}catch(e){return {}}
}
function saveState(){
  try{localStorage.setItem('ehs_v3',JSON.stringify(state))}catch(e){}
}
let state = loadState();
// state[id] = {status, pri, target, owner, notes}

function getField(id, field){
  const s = state[id];
  const a = ACTIONS.find(x=>x.id===id);
  if(s && s[field] !== undefined) return s[field];
  return a ? a[field] : '';
}
function setField(id, field, val){
  if(!state[id]) state[id] = {};
  state[id][field] = val;
  saveState();
  refreshCounts();
  showToast(`✅ Updated`);
}

// ═════════════════════════════════════════════════════════════════
// HELPERS
// ═════════════════════════════════════════════════════════════════
function pc(p){return p>=75?'#059669':p>=40?'#D97706':'#DC2626'}
function pb(pct,h=8){return `<div class="pt" style="height:${h}px"><div class="pf" style="width:${Math.min(pct,100)}%;background:${pc(pct)};height:${h}px"></div></div>`}
function bc(s){return 'badge b-'+(s||'Open').replace(/[\s-]/g,'')}
function priClass(p){return 'p-'+(p||'Low')}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function showToast(m){toast(m)}
function actionsForPerson(nameOrKey){
  const name = TEAM[nameOrKey]?TEAM[nameOrKey].name:nameOrKey;
  return ACTIONS.filter(a=>(getField(a.id,'owner')||a.owner)===name);
}
function byStatus(s){return ACTIONS.filter(a=>getField(a.id,'status')===s).length}
function totalDone(){return ACTIONS.filter(a=>getField(a.id,'status')==='Complete').length}

// Select HTML helper
function selOpts(opts, current){
  return opts.map(o=>`<option value="${o}"${o===current?' selected':''}>${o}</option>`).join('');
}

// Editable select cell
function editSel(id, field, opts, current, extraStyle=''){
  return `<select class="cell-edit" style="${extraStyle}" onchange="setField(${id},'${field}',this.value);updateRow(${id})">
    ${selOpts(opts, current)}
  </select>`;
}
// Editable text cell
function editTxt(id, field, current){
  return `<input class="cell-edit" type="text" value="${(current||'').replace(/"/g,'&quot;')}" onchange="setField(${id},'${field}',this.value);updateRow(${id})" placeholder="Edit…"/>`;
}

function updateRow(id){
  refreshCounts();
  // Re-render the specific row if it exists
  const row = document.getElementById('arow-'+id);
  if(row) row.outerHTML = buildActionRow(id, ACTIONS.find(a=>a.id===id));
}

// ═════════════════════════════════════════════════════════════════
// BUILD ACTION ROW  — fully editable
// ═════════════════════════════════════════════════════════════════
function buildActionRow(id, a){
  const status  = getField(id,'status');
  const pri     = getField(id,'pri');
  const target  = getField(id,'target');
  const owner   = getField(id,'owner');
  const prog    = getField(id,'prog');
  const isDone  = status==='Complete';
  const ownerKey= Object.entries(TEAM).find(([k,v])=>v.name===owner);
  const oc = ownerKey ? TEAM[ownerKey[0]].color : '#374151';
  const rowBg = isDone?'background:#F0FDF4':'';

  return `<tr id="arow-${id}" style="${rowBg}">
    <td>
      <button class="chk${isDone?' on':''}" onclick="toggleDone(${id})">${isDone?'✓':''}</button>
    </td>
    <td style="max-width:280px;font-weight:500;font-size:12px;${isDone?'text-decoration:line-through;color:#9CA3AF':''}">${a.task}</td>
    <td>
      <select class="cell-edit" onchange="setField(${id},'owner',this.value);updateRow(${id})">
        ${selOpts(PERSON_OPTS, owner)}
      </select>
    </td>
    <td>
      <select class="cell-edit" onchange="setField(${id},'status',this.value);updateRow(${id})">
        ${selOpts(STATUS_OPTS, status)}
      </select>
    </td>
    <td>
      <select class="cell-edit" onchange="setField(${id},'pri',this.value);updateRow(${id})">
        ${selOpts(PRI_OPTS, pri)}
      </select>
    </td>
    <td>
      <select class="cell-edit" onchange="setField(${id},'target',this.value);updateRow(${id})">
        ${selOpts(TARGET_OPTS, target)}
      </select>
    </td>
    <td>
      <select class="cell-edit" onchange="setField(${id},'prog',this.value);updateRow(${id})">
        ${selOpts(['Core EHS','Ergo','VPP','Security'], prog)}
      </select>
    </td>
  </tr>`;
}

function toggleDone(id){
  const s=getField(id,'status');
  const ns=s==='Complete'?'Open':'Complete';
  setField(id,'status',ns);
  updateRow(id);
  toast(ns==='Complete'?'✅ Marked Complete!':'↩ Reopened');
}

function applyFilters(){
  const person  = (document.getElementById('f-person')||{}).value||'All';
  const status  = (document.getElementById('f-status')||{}).value||'All';
  const program = (document.getElementById('f-program')||{}).value||'All';
  const pri     = (document.getElementById('f-pri')||{}).value||'All';
  const search  = ((document.getElementById('f-search')||{}).value||'').toLowerCase();
  filteredActions=ACTIONS.filter(a=>{
    const s=getField(a.id,'status'),o=getField(a.id,'owner'),p=getField(a.id,'pri'),pg=getField(a.id,'prog');
    if(person!=='All'&&o!==person) return false;
    if(status!=='All'&&s!==status) return false;
    if(program!=='All'&&pg!==program) return false;
    if(pri!=='All'&&p!==pri) return false;
    if(search&&!a.task.toLowerCase().includes(search)&&!o.toLowerCase().includes(search)) return false;
    return true;
  });
  const fc=document.getElementById('fcount');
  if(fc) fc.innerHTML=`Showing <strong>${filteredActions.length}</strong> of ${ACTIONS.length}`;
  const tbody=document.getElementById('actions-body');
  if(!tbody) return;
  if(!filteredActions.length){
    tbody.innerHTML=`<tr><td colspan="7" style="padding:30px;text-align:center;color:var(--muted)">No actions match. <a class="link" href="#" onclick="clearFilters();return false">Clear filters</a></td></tr>`;
    return;
  }
  tbody.innerHTML=filteredActions.map(a=>buildActionRow(a.id,a)).join('');
}

function clearFilters(){
  ['f-person','f-status','f-program','f-pri'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='All';});
  const fs=document.getElementById('f-search');if(fs)fs.value='';
  applyFilters();
}

        <div style="display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--muted);margin-top:6px"><span>Overall Completion</span><span style="color:${pc(pct)}">${pct}%</span></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-hdr"><span class="ch-title">📅 Weekly Schedule</span></div>
        <div style="overflow-x:auto">
          <table style="border-collapse:collapse;min-width:500px;width:100%">
            <thead><tr>
              <th style="width:60px;padding:8px;background:var(--bg);font-size:9px;font-weight:800;color:var(--navy);border-right:1px solid var(--border);border-bottom:2px solid var(--border2)">TIME</th>
              ${DAYS.map(d=>`<th style="padding:8px;background:var(--bg);font-size:9px;font-weight:800;color:var(--navy);text-align:center;border-right:1px solid var(--border);border-bottom:2px solid var(--border2)">${d}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${TIMES.map(time=>`<tr>
                <td style="padding:3px 8px;font-size:9px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;background:var(--surface2);white-space:nowrap;height:30px">${time}</td>
                ${[1,2,3,4,5].map(day=>{
                  const ev=schedMap[day+'-'+time];
                  return `<td style="border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;height:30px;padding:2px;background:${ev?ev.bg:'transparent'}">
                    ${ev?`<div style="font-size:9px;font-weight:700;color:${ev.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;line-height:26px;border-left:3px solid ${ev.color}">${ev.label}</div>`:''}
                  </td>`;
                }).join('')}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><span class="ch-title">🔁 Recurring Tasks</span></div>
        ${recHTML}
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">
        <span class="ch-title">✅ My Action Items — All fields editable</span>
        <span class="ch-sub">${acts.length} total · ${done} complete · ${behind} behind</span>
      </div>
      <div style="padding:8px 16px;background:#EFF6FF;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--navy)">
        ✏️ Click any dropdown to edit status, owner, priority, target date, or program
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>✔</th><th>Action Item</th><th>Owner</th><th>Status</th><th>Priority</th><th>Target Date</th><th>Program</th></tr></thead>
          <tbody>${personActRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ═════════════════════════════════════════════════════════════════
// NAVIGATION
// ═════════════════════════════════════════════════════════════════
const ALL_PAGES=['overview','actions','vpp','VP','SW','MS','RD','ZT'];
let currentPage='overview';

function buildNav(){
  const wrap=document.getElementById('nav-wrap');
  const navItems=[
    {id:'overview',label:'📊 Overview'},
    {id:'actions', label:'✅ Actions'},
    {id:'vpp',     label:'⭐ VPP Path'},
    {id:'VP',      label:'🔵 Victor'},
    {id:'SW',      label:'🟢 Steve'},
    {id:'MS',      label:'🟣 Mike'},
    {id:'RD',      label:'🩵 Rich'},
    {id:'ZT',      label:'🟡 Zach'},
  ];
  wrap.innerHTML=navItems.map(n=>`
    <button class="nav-btn${n.id===currentPage?' active':''}" id="nav-${n.id}" onclick="switchPage('${n.id}')">${n.label}</button>
  `).join('');
}

function switchPage(id){
  ALL_PAGES.forEach(p=>{
    const el=document.getElementById('page-'+p);
    if(el) el.classList.toggle('page-hidden',p!==id);
    if(el && p===id) el.classList.add('fade-in');
    const nb=document.getElementById('nav-'+p);
    if(nb) nb.classList.toggle('active',p===id);
  });
  currentPage=id;
  window.scrollTo({top:0,behavior:'smooth'});
  // Build page on demand if empty
  if(id==='actions' && !document.getElementById('actions-body')) buildActions();
  if(id==='vpp' && !document.getElementById('page-vpp').innerHTML.trim()) buildVPP();
  if(['VP','SW','MS','RD','ZT'].includes(id)) buildPersonPage(id);
}

// ═════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════
buildNav();
buildOverview();
buildActions();
buildVPP();
</script>
