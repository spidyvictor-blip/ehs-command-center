<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EHS Command Center · GE Aerospace Muskegon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4FF;--surface:#fff;--surface2:#F8FAFF;
  --border:#CBD5F0;--border2:#A5B4FC;
  --navy:#0F2D6B;--navy2:#1E3A8A;--blue:#1D4ED8;--blue2:#3B82F6;--blue-lt:#EFF6FF;
  --green:#059669;--green-lt:#D1FAE5;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --red:#DC2626;--red-lt:#FEE2E2;
  --purple:#7C3AED;--purple-lt:#EDE9FE;
  --teal:#0891B2;--teal-lt:#CFFAFE;
  --gold:#B45309;--gold-lt:#FEF3C7;
  --text:#0F172A;--text2:#1E293B;--text3:#374151;--muted:#6B7280;
  --r:10px;
  --shadow:0 1px 8px rgba(15,45,107,.10);
  --shadow-md:0 4px 20px rgba(15,45,107,.14);
  --shadow-lg:0 8px 40px rgba(15,45,107,.18);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#E0E7FF}
::-webkit-scrollbar-thumb{background:#A5B4FC;border-radius:3px}

/* ── TOPBAR ── */
#topbar{position:sticky;top:0;z-index:600;background:var(--navy);box-shadow:0 2px 16px rgba(0,0,0,.3)}
.tb{max-width:1600px;margin:0 auto;padding:0 18px;display:flex;align-items:stretch;justify-content:space-between}
.brand{padding:11px 0 7px;display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:15px;font-weight:900;color:#fff;display:flex;align-items:center;gap:9px;letter-spacing:-.2px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#34D399;box-shadow:0 0 8px #34D399;animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.brand-sub{font-size:10px;color:#93C5FD;font-weight:500}
.vpp-tag{background:linear-gradient(135deg,#92400E,#D97706);color:#FEF3C7;border-radius:20px;padding:2px 10px;font-size:9px;font-weight:800}
.nav{display:flex;align-items:flex-end;overflow-x:auto;gap:0}
.nb{padding:12px 14px;background:transparent;border:none;color:#93C5FD;font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif}
.nb:hover{color:#fff;background:rgba(255,255,255,.07)}
.nb.active{color:#fff;border-bottom-color:#60A5FA;background:rgba(255,255,255,.05)}

/* ── PAGE ── */
main{max-width:1600px;margin:0 auto;padding:18px 18px 60px}
.page{display:flex;flex-direction:column;gap:14px}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .22s ease both}

/* ── CARD ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.ch{padding:12px 16px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ch-gold{background:linear-gradient(135deg,#78350F,#B45309)}
.ch-green{background:linear-gradient(135deg,#064E3B,#059669)}
.ch-purple{background:linear-gradient(135deg,#4C1D95,#7C3AED)}
.ct{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:7px}
.cs{font-size:10px;color:#93C5FD;font-weight:500}
.cs-gold{color:#FCD34D}

/* ── KPI ── */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px}
.kcard{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:14px 15px 12px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:default}
.kcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ktop{position:absolute;top:0;left:0;right:0;height:4px}
.kval{font-size:28px;font-weight:900;line-height:1;letter-spacing:-1px;margin-top:2px}
.klbl{font-size:9px;font-weight:800;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.6px}
.ksub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── PROGRESS ── */
.pt{background:#E0E7FF;border-radius:8px;overflow:hidden}
.pf{border-radius:8px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1.5px solid transparent}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s-Complete{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}.s-Complete::before{background:#059669}
.s-OnSchedule{background:#CFFAFE;color:#164E63;border-color:#67E8F9}.s-OnSchedule::before{background:#0891B2}
.s-Behind{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5}.s-Behind::before{background:#DC2626}
.s-AtRisk{background:#FEF3C7;color:#92400E;border-color:#FCD34D}.s-AtRisk::before{background:#D97706}
.s-NotStarted{background:#EDE9FE;color:#4C1D95;border-color:#C4B5FD}.s-NotStarted::before{background:#7C3AED}
.s-Open{background:#F1F5F9;color:#374151;border-color:#CBD5E1}.s-Open::before{background:#6B7280}
.s-Ongoing{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}.s-Ongoing::before{background:#059669}
.s-OnHold{background:#FEF3C7;color:#92400E;border-color:#FCD34D}.s-OnHold::before{background:#D97706}
.p-High{background:#FEE2E2;color:#991B1B;border:1.5px solid #FCA5A5;border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800}
.p-Medium{background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D;border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800}
.p-Low{background:#D1FAE5;color:#065F46;border:1.5px solid #6EE7B7;border-radius:7px;padding:2px 7px;font-size:9px;font-weight:800}

/* ── TABLE ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg)}
th{padding:9px 11px;color:var(--navy);font-size:9px;font-weight:800;text-align:left;border-bottom:2px solid var(--border2);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
td{padding:7px 11px;border-bottom:1px solid #EEF2FF;vertical-align:middle;color:var(--text2)}
tbody tr:hover{background:#F0F4FF}
tbody tr.done-row td:nth-child(2){text-decoration:line-through;color:var(--muted)}

/* ── EDITABLE ── */
.esel{background:transparent;border:1.5px solid transparent;border-radius:6px;padding:3px 5px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer;transition:all .15s;outline:none;font-weight:500}
.esel:hover{border-color:var(--border2);background:#F0F4FF}
.esel:focus{border-color:var(--blue);background:#EFF6FF;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.etxt{background:transparent;border:1.5px solid transparent;border-radius:6px;padding:3px 6px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text);transition:all .15s;outline:none;width:100%}
.etxt:hover{border-color:var(--border2);background:#F0F4FF}
.etxt:focus{border-color:var(--blue);background:#EFF6FF;box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* ── CHECK ── */
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;flex-shrink:0}
.chk:hover{border-color:var(--green);background:var(--green-lt)}
.chk.on{background:var(--green);border-color:var(--green);color:#fff}

/* ── BUTTONS ── */
.btn{border:none;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--navy)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#047857}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#991B1B}
.btn-ghost{background:#EEF2FF;color:var(--navy)}.btn-ghost:hover{background:var(--border2);color:#fff}
.btn-sm{padding:4px 9px;font-size:10px;border-radius:6px}
.btn-icon{width:28px;height:28px;padding:0;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}

/* ── FILTER BAR ── */
.fbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;padding:12px 16px;background:var(--surface2);border-bottom:1.5px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:9px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.8px}
select.fsel2,input.fsrch{background:#fff;color:var(--text);border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:11px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;font-weight:500}
select.fsel2{min-width:120px}input.fsrch{min-width:170px}
select.fsel2:focus,input.fsrch:focus{border-color:var(--blue)}
.fcount{font-size:11px;color:var(--muted);align-self:flex-end;padding-bottom:6px;font-weight:600}
.fcount strong{color:var(--blue)}

/* ── STATUS TILES ── */
.stiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:9px;padding:14px 16px}
.stile{border-radius:9px;padding:12px;text-align:center;cursor:pointer;border:2px solid;transition:transform .15s,box-shadow .15s}
.stile:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stv{font-size:22px;font-weight:900;line-height:1}
.stl{font-size:9px;font-weight:800;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.stp{font-size:9px;color:var(--muted);margin-top:1px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:800;color:var(--navy)}
.modal-close{width:30px;height:30px;border:none;background:#F1F5F9;border-radius:7px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-close:hover{background:#FEE2E2;color:var(--red)}
.modal-body{padding:20px}
.mfield{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.mfield label{font-size:10px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.7px}
.mfield input,.mfield select,.mfield textarea{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;width:100%}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--blue)}
.mfield textarea{min-height:80px;resize:vertical}
.modal-foot{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── COMMENTS ── */
.comment-list{display:flex;flex-direction:column;gap:8px;padding:12px 16px}
.comment{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.comment-meta{font-size:10px;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;margin-bottom:5px}
.comment-text{font-size:12px;color:var(--text2);line-height:1.5}
.comment-input-row{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);align-items:flex-end}
.comment-input-row textarea{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:36px}
.comment-input-row textarea:focus{border-color:var(--blue)}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:400px}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.5}
.msg-user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-ai{background:var(--surface2);color:var(--text2);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-system{background:#EDE9FE;color:#4C1D95;align-self:center;font-size:11px;font-weight:600;border-radius:20px;padding:5px 14px;border:1px solid #C4B5FD}
.msg-meta{font-size:10px;opacity:.6;margin-top:4px;font-weight:500}
.chat-input-area{padding:12px 16px;border-top:1.5px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--surface2)}
.chat-input-area textarea{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:40px;max-height:100px}
.chat-input-area textarea:focus{border-color:var(--blue)}
.ai-thinking{display:flex;gap:4px;padding:10px 14px;background:var(--surface2);border-radius:12px;border:1px solid var(--border);align-self:flex-start}
.ai-thinking span{width:7px;height:7px;border-radius:50%;background:var(--blue2);animation:bounce .9s infinite}
.ai-thinking span:nth-child(2){animation-delay:.15s}
.ai-thinking span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(1)}40%{transform:scale(1.4)}}

/* ── LINKS ── */
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:16px}
.link-card{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:box-shadow .15s,border-color .15s;cursor:pointer;text-decoration:none}
.link-card:hover{box-shadow:var(--shadow-md);border-color:var(--blue2)}
.link-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.link-name{font-size:13px;font-weight:700;color:var(--navy)}
.link-desc{font-size:11px;color:var(--muted);margin-top:2px}

/* ── METRICS ── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px}
.mcard{background:var(--surface);border:2px solid var(--border);border-radius:9px;padding:14px 16px;box-shadow:var(--shadow)}
.mcard-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.mcard-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.mcard-input{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;outline:none;width:100%;transition:border-color .15s;color:var(--navy)}
.mcard-input:focus{border-color:var(--blue)}
.mcard-sub{font-size:10px;color:var(--muted);margin-top:5px}
.mcard-trend{font-size:11px;font-weight:700;margin-top:4px}

/* ── PERSON BANNER ── */
.pbanner{padding:18px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.pavatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.4);flex-shrink:0}
.pname{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.2px}
.prole{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.pmkpis{display:flex;gap:9px;flex-wrap:wrap;margin-left:auto}
.pmk{background:rgba(255,255,255,.12);border-radius:8px;padding:9px 13px;text-align:center;min-width:65px;border:1px solid rgba(255,255,255,.2)}
.pmkv{font-size:18px;font-weight:900;color:#fff;line-height:1}
.pmkl{font-size:8px;font-weight:700;color:rgba(255,255,255,.65);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ── SCHED GRID ── */
.sg{display:grid;grid-template-columns:55px repeat(5,1fr);border-top:1px solid var(--border)}
.sg-th{padding:7px;text-align:center;background:var(--bg);border-bottom:2px solid var(--border2);font-size:9px;font-weight:800;color:var(--navy);border-right:1px solid var(--border)}
.sg-time{padding:3px 7px;font-size:9px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;background:var(--surface2);text-align:right;height:28px;line-height:20px}
.sg-cell{border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;height:28px;padding:2px}
.sg-ev{border-radius:4px;padding:0 5px;font-size:9px;font-weight:700;height:22px;display:flex;align-items:center;white-space:nowrap;overflow:hidden;border-left:2px solid;cursor:default}
.sg-ev:hover{overflow:visible;white-space:normal;z-index:10;position:relative;box-shadow:var(--shadow-md)}

/* ── REC TASKS ── */
.rec-hdr{padding:5px 14px;font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.7px}
.rec-item{display:flex;align-items:center;gap:9px;padding:6px 14px;border-bottom:1px solid #EEF2FF;font-size:11px;color:var(--text2);font-weight:500}
.rec-item:last-child{border-bottom:none}
.rec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── MILESTONE ── */
.ms-row{display:flex;align-items:center;gap:13px;padding:11px 16px;border-bottom:1px solid #EEF2FF;flex-wrap:wrap;transition:background .1s}
.ms-row:hover{background:#F0F4FF}
.ms-num{width:28px;height:28px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.ms-goal .ms-num{background:linear-gradient(135deg,#92400E,#D97706)}
.ms-text{flex:1;min-width:150px}
.ms-title{font-size:12px;font-weight:600;color:var(--navy)}
.ms-goal .ms-title{font-weight:900;color:var(--gold);font-size:13px}
.ms-meta{font-size:10px;color:var(--muted);margin-top:1px}
.ms-prog{min-width:150px;display:flex;flex-direction:column;gap:4px}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:9px;font-size:12px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:9999;display:flex;align-items:center;gap:8px}
#toast.show{opacity:1;transform:translateY(0)}

/* ── MISC ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.section-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:10px 16px 6px;border-bottom:1px solid var(--border)}
.info-bar{padding:8px 16px;background:#EFF6FF;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:7px}
a.lnk{color:var(--blue);font-weight:700;text-decoration:none}
a.lnk:hover{text-decoration:underline}
footer{background:var(--navy);color:#93C5FD;text-align:center;padding:14px;font-size:10px;font-weight:500;letter-spacing:.3px;margin-top:20px}
@media(max-width:800px){.g2,.g3{grid-template-columns:1fr}}
@media(max-width:640px){.kgrid{grid-template-columns:repeat(2,1fr)}.nav{overflow-x:auto}main{padding:10px 10px 40px}}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb">
    <div class="brand">
      <div class="brand-name"><span class="live-dot"></span>EHS COMMAND CENTER<span class="vpp-tag">⭐ VPP STAR · OCT 2026</span></div>
      <div class="brand-sub">GE AEROSPACE MUSKEGON · 2026 STRATEGIC ACTION PLAN</div>
    </div>
    <div class="nav" id="nav"></div>
  </div>
</div>

<main>

function loadS(){try{return JSON.parse(localStorage.getItem('ehsv4')||'{}')}catch(e){return {}}}
function saveS(){try{localStorage.setItem('ehsv4',JSON.stringify(S))}catch(e){}}

let S=loadS();
if(!S.actions)  S.actions=JSON.parse(JSON.stringify(DEFAULT_ACTIONS));
if(!S.vpp)      S.vpp=JSON.parse(JSON.stringify(DEFAULT_VPP));
if(!S.metrics)  S.metrics=JSON.parse(JSON.stringify(DEFAULT_METRICS));
if(!S.links)    S.links=JSON.parse(JSON.stringify(DEFAULT_LINKS));
if(!S.comments) S.comments={};
if(!S.chat)     S.chat=[];
if(!S.nextId)   S.nextId=200;

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════
function pc(p){return p>=75?'#059669':p>=40?'#D97706':'#DC2626'}
function pb(pct,h=8){const p=Math.min(pct,100);return `<div class="pt" style="height:${h}px"><div class="pf" style="width:${p}%;background:${pc(pct)};height:${h}px"></div></div>`}
function bk(s){return 'badge s-'+(s||'Open').replace(/[\s-]/g,'')}
function pri(p){return `<span class="p-${p||'Low'}">${p||'Low'}</span>`}
function toast(msg,col){
  const t=document.getElementById('toast');
  t.style.background=col||'var(--navy)';
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function opts(arr,cur){return arr.map(o=>`<option${o===cur?' selected':''}>${o}</option>`).join('')}

function actionsFor(name){return S.actions.filter(a=>a.owner===name)}
function byStatus(s){return S.actions.filter(a=>a.status===s).length}
function totalDone(){return S.actions.filter(a=>a.status==='Complete').length}
function totalCount(){return S.actions.length}

function upd(id,field,val){
  const a=S.actions.find(x=>x.id===id);if(a){a[field]=val;saveS();}
  rebuildAll();
  toast(`✅ ${field} updated`,'#059669');
}

function del(id){
  if(!confirm('Delete this task?')) return;
  S.actions=S.actions.filter(a=>a.id!==id);
  saveS();rebuildAll();
  toast('🗑️ Task deleted','#DC2626');
}

function toggleDone(id){
  const a=S.actions.find(x=>x.id===id);
  if(!a) return;
  a.status=a.status==='Complete'?'Open':'Complete';
  saveS();rebuildAll();
  toast(a.status==='Complete'?'✅ Marked Complete!':'↩ Reopened');
}

function rebuildAll(){
  buildOverview();
  // Re-render current visible page if it's actions or a person page
  const cur=Object.keys(PAGES).find(k=>!document.getElementById('pg-'+k).classList.contains('hidden'));
  if(cur==='actions') buildActions();
  else if(['VP','SW','MS','RD','ZT'].includes(cur)) buildPersonPage(cur);
}

// ACTION ROW
// ════════════════════════════════════════════════════
function buildRow(a){
  const done=a.status==='Complete';
  const tkey=Object.entries(TEAM).find(([k,v])=>v.name===a.owner);
  const tc=tkey?TEAM[tkey[0]].color:'#374151';
  const cmtCount=(S.comments[a.id]||[]).length;
  return `<tr id="r${a.id}" class="${done?'done-row':''}">
    <td><button class="chk${done?' on':''}" onclick="toggleDone(${a.id})">${done?'✓':''}</button></td>
    <td style="max-width:250px"><input class="etxt" value="${a.task.replace(/"/g,'&quot;')}" style="width:100%;font-weight:${done?400:500};${done?'text-decoration:line-through;color:var(--muted)':''}" onchange="upd(${a.id},'task',this.value)"/></td>
    <td><select class="esel" onchange="upd(${a.id},'owner',this.value)">${opts(PERSON_OPTS,a.owner)}</select></td>
    <td><select class="esel" onchange="upd(${a.id},'status',this.value)">${opts(STATUS_OPTS,a.status)}</select></td>
    <td><select class="esel" onchange="upd(${a.id},'pri',this.value)">${opts(PRI_OPTS,a.pri)}</select></td>
    <td><select class="esel" onchange="upd(${a.id},'target',this.value)">${opts(TARGET_OPTS,a.target)}</select></td>
    <td><select class="esel" onchange="upd(${a.id},'prog',this.value)">${opts(PROG_OPTS,a.prog)}</select></td>
    <td>
      <div style="display:flex;gap:5px;align-items:center">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="openComments(${a.id})" title="Comments & Updates" style="font-size:12px">
          💬${cmtCount>0?`<span style="font-size:9px;background:var(--blue);color:#fff;border-radius:10px;padding:1px 5px;margin-left:2px">${cmtCount}</span>`:''}
        </button>
        <button class="btn btn-red btn-sm btn-icon" onclick="del(${a.id})" title="Delete task">🗑️</button>
      </div>
    </td>
  </tr>`;
}

let editingId=null;
function openAddModal(preOwner){
  editingId=null;
  document.getElementById('modal-add-title').textContent='➕ Add New Task';
  document.getElementById('m-task').value='';
  document.getElementById('m-notes').value='';
  document.getElementById('m-status').value='Open';
  document.getElementById('m-pri').value='High';
  document.getElementById('m-target').value='Q2 2026';
  document.getElementById('m-prog').value='Core EHS';
  if(preOwner) document.getElementById('m-owner').value=preOwner;
  document.getElementById('modal-add').classList.remove('hidden');
  document.getElementById('m-task').focus();
}
function closeModal(id){document.getElementById(id).classList.add('hidden')}
function saveNewTask(){
  const task=document.getElementById('m-task').value.trim();
  if(!task){toast('⚠️ Task name required','#DC2626');return;}
  const newA={
    id:S.nextId++,
    task,
    owner:document.getElementById('m-owner').value,
    status:document.getElementById('m-status').value,
    pri:document.getElementById('m-pri').value,
    target:document.getElementById('m-target').value,
    prog:document.getElementById('m-prog').value,
  };
  const notes=document.getElementById('m-notes').value.trim();
  if(notes){
    S.comments[newA.id]=[{author:"You",text:notes,time:new Date().toLocaleString()}];
  }
  S.actions.push(newA);
  saveS();closeModal('modal-add');rebuildAll();
  toast('✅ Task added!','#059669');
}

let commentTaskId=null;
function openComments(id){
  commentTaskId=id;
  const a=S.actions.find(x=>x.id===id);
  document.getElementById('comment-task-name').textContent=a?a.task:'';
  renderComments();
  document.getElementById('modal-comment').classList.remove('hidden');
}
function renderComments(){
  const list=document.getElementById('comment-list');
  const cmts=S.comments[commentTaskId]||[];
  if(!cmts.length){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No comments yet. Add the first update below.</div>';
    return;
  }
  list.innerHTML=cmts.map(c=>`
    <div class="comment">
      <div class="comment-meta"><span>👤 ${c.author}</span><span>${c.time}</span></div>
      <div class="comment-text">${c.text}</div>
    </div>`).join('');
  list.scrollTop=list.scrollHeight;
}
function addComment(){
  const inp=document.getElementById('comment-input');
  const text=inp.value.trim();
  if(!text) return;
  if(!S.comments[commentTaskId]) S.comments[commentTaskId]=[];
  S.comments[commentTaskId].push({author:"Team Member",text,time:new Date().toLocaleString()});
  inp.value='';
  saveS();renderComments();rebuildAll();
  toast('💬 Comment added');
}

    </div>`;

function applyF(){
  const p=val('fa-person'),s=val('fa-status'),g=val('fa-prog'),r=val('fa-pri'),q=(val('fa-search')||'').toLowerCase();
  const fl=S.actions.filter(a=>{
    if(p!=='All'&&a.owner!==p) return false;
    if(s!=='All'&&a.status!==s) return false;
    if(g!=='All'&&a.prog!==g) return false;
    if(r!=='All'&&a.pri!==r) return false;
    if(q&&!a.task.toLowerCase().includes(q)&&!a.owner.toLowerCase().includes(q)) return false;
    return true;
  });
  const fc=document.getElementById('fc');
  if(fc) fc.innerHTML=`Showing <strong>${fl.length}</strong> of ${S.actions.length}`;
  const tb=document.getElementById('atbody');
  if(!tb) return;
  tb.innerHTML=fl.length?fl.map(buildRow).join(''):
    '<tr><td colspan="8" style="padding:28px;text-align:center;color:var(--muted)">No tasks match. <a class="lnk" href="#" onclick="clearF();return false">Clear filters</a></td></tr>';
}

function clearF(){['fa-person','fa-status','fa-prog','fa-pri'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='All';});const e=document.getElementById('fa-search');if(e)e.value='';applyF();}

// CHAT + AI PAGE
// ════════════════════════════════════════════════════
function buildChat(){
  document.getElementById('pg-chat').innerHTML=`
    <div class="card" style="height:calc(100vh - 160px);min-height:500px;display:flex;flex-direction:column">
      <div class="ch">
        <span class="ct">🤖 EHS AI Assistant + Team Chat</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="cs">Ask about tasks, due dates, metrics, or request changes</span>
          <button class="btn btn-ghost btn-sm" onclick="clearChat()">Clear</button>
        </div>
      </div>
      <div style="padding:8px 14px;background:#EFF6FF;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--navy)">
        💡 Try: "What's behind?" · "Add a task for Steve: LOTO review by Q3" · "How many open actions?" · "Who has the most behind?" · "Mark task 5 complete"
      </div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask anything about the EHS team or request a task change…" rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
        <button class="btn btn-primary" onclick="sendChat()">Send ➤</button>
      </div>
    </div>`;
  renderChat();
  if(S.chat.length===0) addSysMsg("👋 Hi! I'm your EHS AI assistant. I can answer questions about tasks, update statuses, add new tasks, or chat with the team. What do you need?");
}
function addSysMsg(text){S.chat.push({role:'system',text,time:now()});saveS();renderChat();}
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function renderChat(){
  const el=document.getElementById('chat-msgs');if(!el) return;
  el.innerHTML=S.chat.map(m=>`
    <div class="msg ${m.role==='user'?'msg-user':m.role==='system'?'msg-system':'msg-ai'}">
      ${m.text}
      ${m.role!=='system'?`<div class="msg-meta">${m.role==='user'?'You':'🤖 AI'} · ${m.time}</div>`:''}
    </div>`).join('');
  el.scrollTop=el.scrollHeight;
}
function clearChat(){S.chat=[];saveS();buildChat();}

async function sendChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text) return;
  inp.value='';
  S.chat.push({role:'user',text,time:now()});
  saveS();renderChat();

  // Show typing indicator
  const msgs=document.getElementById('chat-msgs');
  const typDiv=document.createElement('div');
  typDiv.className='ai-thinking';typDiv.id='typing';
  typDiv.innerHTML='<span></span><span></span><span></span>';
  msgs.appendChild(typDiv);msgs.scrollTop=msgs.scrollHeight;

  // Try to handle locally first
  const localReply=handleLocally(text);
  if(localReply){
    setTimeout(()=>{
      const t=document.getElementById('typing');if(t)t.remove();
      S.chat.push({role:'ai',text:localReply,time:now()});
      saveS();renderChat();rebuildAll();
    },600);
    return;
  }

  // Call Anthropic API
  const systemPrompt=`You are an EHS AI assistant for GE Aerospace Muskegon's EHS department. 
The team is: Victor Pizarro (EHS Leader), Steve Wolbrink (EHS Compliance Specialist), Mike Shuster (Ergonomic Specialist ATI), Rich DeLeau (EHS Specialist Contract), Zach Tindall (Security Specialist).
Current action items count: ${S.actions.length}. Complete: ${totalDone()}. Behind: ${byStatus('Behind')}. At-Risk: ${byStatus('At-Risk')}.
Behind items: ${S.actions.filter(a=>a.status==='Behind').slice(0,5).map(a=>a.task+' ('+a.owner+')').join(', ')}.
VPP Star target: October 2026.
Answer questions about the team, EHS best practices, safety regulations, or ergonomics. Be concise, helpful, and professional. Use bullet points when listing things. If asked to create or modify tasks, explain what you would do.`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:400,
        system:systemPrompt,
        messages:[{role:"user",content:text}]
      })
    });
    const data=await res.json();
    const reply=data.content?data.content.map(b=>b.text||'').join(''):'I had trouble responding. Please try again.';
    const t=document.getElementById('typing');if(t)t.remove();
    S.chat.push({role:'ai',text:reply,time:now()});
    saveS();renderChat();
  }catch(e){
    const t=document.getElementById('typing');if(t)t.remove();
    S.chat.push({role:'ai',text:"⚠️ I couldn't connect right now. But I'm still here to help with local queries — try asking what's behind or how many tasks are open!",time:now()});
    saveS();renderChat();
  }
}

function handleLocally(text){
  const t=text.toLowerCase();
  const behind=S.actions.filter(a=>a.status==='Behind');
  const open=S.actions.filter(a=>a.status==='Open'||a.status==='Not Started');
  const done=S.actions.filter(a=>a.status==='Complete');

  if(t.includes("what's behind")||t.includes("whats behind")||t.includes("what is behind")){
    if(!behind.length) return "✅ Nothing is behind! Great work.";
    return `🔴 <strong>${behind.length} items are Behind:</strong><br>`+behind.slice(0,8).map(a=>`• ${a.task} — <em>${a.owner}</em>`).join('<br>');
  }
  if(t.includes("how many open")){return `📋 There are <strong>${open.length} open/not-started</strong> tasks.`}
  if(t.includes("how many complete")||t.includes("how many done")){return `✅ <strong>${done.length} of ${S.actions.length}</strong> tasks are complete (${Math.round(done.length/S.actions.length*100)}%).`}
  if(t.includes("who has the most behind")){
    const counts={};behind.forEach(a=>{counts[a.owner]=(counts[a.owner]||0)+1;});
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length) return "✅ Nobody is behind right now!";
    return `🔴 Most behind: <strong>${sorted[0][0]}</strong> with ${sorted[0][1]} items. Full breakdown:<br>`+sorted.map(([n,c])=>`• ${n}: ${c}`).join('<br>');
  }
  if(t.includes("at-risk")||t.includes("at risk")){
    const ar=S.actions.filter(a=>a.status==='At-Risk');
    if(!ar.length) return "✅ No at-risk items right now!";
    return `🟡 <strong>${ar.length} At-Risk items:</strong><br>`+ar.slice(0,6).map(a=>`• ${a.task} — <em>${a.owner}</em>`).join('<br>');
  }
  if(t.includes("add task")&&t.includes("for ")){
    openAddModal();
    return "Sure! I've opened the Add Task dialog for you. Fill in the details and click Add Task.";
  }
  if(t.includes("mark task")&&t.includes("complete")){
    const match=t.match(/task\s+(\d+)/);
    if(match){
      const id=parseInt(match[1]);
      const a=S.actions.find(x=>x.id===id);
      if(a){a.status='Complete';saveS();return `✅ Task #${id} "${a.task}" marked complete!`;}
    }
    return "I couldn't find that task. Try: 'mark task 5 complete'";
  }
  if(t.includes("vpp")){
    const ng=S.vpp.slice(0,-1);
    const avg=ng.length?Math.round(ng.reduce((s,m)=>s+m.pct,0)/ng.length):0;
    const behind=S.vpp.filter(m=>m.status==='Behind');
    return `⭐ VPP Star target: October 2026. Average milestone progress: <strong>${avg}%</strong>. ${behind.length} milestones are Behind: ${behind.map(m=>m.ms).slice(0,3).join(', ')}.`;
  }
  if(t.includes("how many task")||t.includes("total task")){
    return `📊 Total tasks: <strong>${S.actions.length}</strong>. Complete: ${done.length}. Behind: ${behind.length}. Open: ${open.length}.`;
  }
  if(t.includes("hello")||t.includes("hi ")||t.includes("hey ")){
    return "👋 Hey! I'm your EHS assistant. I can tell you what's behind, who has the most open items, your VPP progress, or help add/update tasks. What do you need?";
  }
  return null; // fall through to API
}

function buildPersonPage(key){

  const bannerHTML=`<div style="background:${t.bg};border-radius:var(--r) var(--r) 0 0">

    </div>
    <div style="padding:0 22px 14px">${pb(pct,10)}</div>

  const RBGS={DAILY:"#1D4ED8",WEEKLY:"#059669",MONTHLY:"#7C3AED",ONGOING:"#374151"};
  const recHTML=Object.entries(rec).map(([freq,items])=>`

    ${items.map(item=>`<div class="rec-item"><div class="rec-dot" style="background:${RBGS[freq]||'#374151'}"></div>${item}</div>`).join('')}`).join('');

  const calHTML=`<div style="overflow-x:auto"><table style="border-collapse:collapse;min-width:480px;width:100%">
    <thead><tr>
      <th style="width:55px;padding:7px;background:var(--bg);font-size:9px;font-weight:800;color:var(--navy);border-right:1px solid var(--border);border-bottom:2px solid var(--border2)">TIME</th>
      ${DAYS.map(d=>`<th style="padding:7px;background:var(--bg);font-size:9px;font-weight:800;color:var(--navy);text-align:center;border-right:1px solid var(--border);border-bottom:2px solid var(--border2)">${d}</th>`).join('')}
    </tr></thead>
    <tbody>${TIMES.map(time=>`<tr>${[0,1,2,3,4,5].map(di=>{
      if(di===0) return `<td style="padding:2px 6px;font-size:9px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;background:var(--surface2);height:26px;text-align:right;vertical-align:middle">${time}</td>`;
      const ev=schedMap[di+'-'+time];
      return `<td style="border-right:1px solid var(--border);border-bottom:1px solid #EEF2FF;height:26px;padding:2px;vertical-align:top">
        ${ev?`<div style="font-size:9px;font-weight:700;color:${ev.color};background:${ev.bg};border-left:2px solid ${ev.color};padding:0 4px;height:20px;line-height:20px;border-radius:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${ev.label}</div>`:''}
      </td>`;
    }).join('')}</tr>`).join('')}</tbody>
  </table></div>`;

  const rowsHTML=acts.map(buildRow).join('');

  document.getElementById('pg-'+key).innerHTML=`
    <div class="card">${bannerHTML}</div>
    <div class="g2">
      <div class="card">

        ${calHTML}

      <div class="card">
        <div class="ch"><span class="ct">🔁 Recurring Tasks</span></div>
        ${recHTML}

        <span class="ct">✅ My Action Items — All Editable</span>

const PAGES={
  overview:{label:"📊 Overview"},
  actions: {label:"✅ Actions"},
  vpp:     {label:"⭐ VPP"},
  metrics: {label:"📈 Metrics"},
  links:   {label:"🔗 Links"},
  chat:    {label:"🤖 AI Chat"},
  VP:      {label:"🔵 Victor"},
  SW:      {label:"🟢 Steve"},
  MS:      {label:"🟣 Mike"},
  RD:      {label:"🩵 Rich"},
  ZT:      {label:"🟡 Zach"},
};
let curPage='overview';
const pageBuilders={
  overview:buildOverview,actions:buildActions,vpp:buildVPP,
  metrics:buildMetrics,links:buildLinks,chat:buildChat,
  VP:()=>buildPersonPage('VP'),SW:()=>buildPersonPage('SW'),
  MS:()=>buildPersonPage('MS'),RD:()=>buildPersonPage('RD'),ZT:()=>buildPersonPage('ZT'),
};

function buildNav(){
  document.getElementById('nav').innerHTML=Object.entries(PAGES).map(([k,v])=>
    `<button class="nb${k===curPage?' active':''}" id="nb-${k}" onclick="goPage('${k}')">${v.label}</button>`
  ).join('');
}
function goPage(id){
  if(!PAGES[id]) return;
  Object.keys(PAGES).forEach(k=>{
    const el=document.getElementById('pg-'+k);
    const btn=document.getElementById('nb-'+k);
    if(el) el.classList.toggle('hidden',k!==id);
    if(el&&k===id){el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');}
    if(btn) btn.classList.toggle('active',k===id);
  });
  curPage=id;
  window.scrollTo({top:0,behavior:'smooth'});
  if(pageBuilders[id]) pageBuilders[id]();
}
